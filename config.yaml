# Triton 算子合规性检查配置

flaggems_dir: /workspace/FlagGems_minimax_2_7

# 扫描模式：
#   single_worktree: 在一个 worktree 目录中扫描所有 ops（原始模式）
#   multi_worktree:  每个算子有独立 worktree，路径为 .worktrees/gen-{op}/
scan_mode: multi_worktree

# single_worktree 模式配置
worktree: ""

# multi_worktree 模式配置
worktree_pattern: ".worktrees/gen-{op}"

# 算子列表文件（仅检查列表中的算子，留空=扫描目录下所有）
ops_list: ""

# 检查范围配置
scan:
  nvidia_ops: true
  backends: []

# Claude Code CLI 配置
claude:
  bin: claude
  max_concurrent: 8
  timeout: 120

# 输出
output_dir: results
