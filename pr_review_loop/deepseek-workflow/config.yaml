workflow_name: deepseek-workflow
planner: codex
executor: claude-code-with-deepseek
reviewer: codex

paths:
  tasks: /workspace/deepseek-workflow/tasks
  rules: /workspace/deepseek-workflow/rules
  templates: /workspace/deepseek-workflow/templates

execution:
  require_handoff: true
  require_execution_log: true
  require_review: true
  stop_on_uncertainty: true
  default_proxy: http://127.0.0.1:15722
  expected_model: deepseek-v4-pro

safety:
  forbid_destructive_commands: true
  forbid_force_push: true
  require_tests_when_code_changes: true
  require_user_approval_for_external_network: true
